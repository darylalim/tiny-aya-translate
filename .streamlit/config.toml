# Nord theme for Tiny Aya Translate — dual light/dark mode.
# Arctic, north-bluish palette: Polar Night (dark) + Snow Storm (light),
# sharing frost-blue accents. Defining both [theme.light] and [theme.dark]
# enables the light/dark switch in Streamlit's settings menu; a single
# [theme] section would lock the app to one mode.

# -- Shared across both modes (typography, shape, status palette) -------------
[theme]
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 14
baseFontWeight = 400
codeFontSize = "0.875rem"
headingFontSizes = ["32px", "24px", "20px", "16px", "14px", "12px"]
headingFontWeights = [600, 600, 600, 600, 600, 600]
baseRadius = "4px"
buttonRadius = "4px"
showWidgetBorder = true
linkUnderline = false
# Nord Aurora — drives st.error / st.warning / st.info accents (auto-tinted per mode)
redColor = "#bf616a"
orangeColor = "#d08770"
yellowColor = "#ebcb8b"
greenColor = "#a3be8c"
violetColor = "#b48ead"
chartCategoricalColors = ["#88c0d0", "#81a1c1", "#5e81ac", "#a3be8c", "#ebcb8b", "#d08770", "#bf616a"]

# -- Dark mode: Polar Night ---------------------------------------------------
[theme.dark]
primaryColor = "#88c0d0"
backgroundColor = "#2e3440"
secondaryBackgroundColor = "#3b4252"
textColor = "#eceff4"
codeBackgroundColor = "#3b4252"
codeTextColor = "#d8dee9"
linkColor = "#81a1c1"
borderColor = "#4c566a"
blueColor = "#81a1c1"

# -- Light mode: Snow Storm ---------------------------------------------------
[theme.light]
primaryColor = "#5e81ac"
backgroundColor = "#eceff4"
secondaryBackgroundColor = "#e5e9f0"
textColor = "#2e3440"
codeBackgroundColor = "#e5e9f0"
codeTextColor = "#2e3440"
linkColor = "#5e81ac"
borderColor = "#d8dee9"
blueColor = "#5e81ac"
